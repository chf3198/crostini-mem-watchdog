# /etc/systemd/journald.conf.d/50-size-limits.conf
# ──────────────────────────────────────────────────────────────────────────────
# Journal size limits for Crostini (6.3 GB RAM, constrained container).
# Installed by: bash install.sh
# Reference: journald.conf(5)
# ──────────────────────────────────────────────────────────────────────────────
[Journal]

# Cap total persistent journal size on disk.
# Default: 10% of filesystem or 4 GB. On a Crostini container this would
# allow the journal to consume hundreds of MB unchecked (confirmed: 260 MB
# with no cap after ~3 days of VS Code + watchdog operation).
SystemMaxUse=100M

# Cap the in-memory (volatile) journal for the current boot.
RuntimeMaxUse=30M

# Rotate out entries older than 2 weeks — keeps recent crash history
# available while preventing unbounded accumulation.
MaxRetentionSec=2weeks

# Per-service rate limiting: max 200 messages per 30 s window before
# suppressing. This is a system-wide floor; mem-watchdog.service also
# sets LogRateLimitBurst=100 for tighter per-service control.
RateLimitIntervalSec=30s
RateLimitBurst=200
