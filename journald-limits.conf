# /etc/systemd/journald.conf.d/50-size-limits.conf
# ──────────────────────────────────────────────────────────────────────────────
# Journal size limits for Crostini (6.3 GB RAM, constrained container).
# Installed by: bash install.sh
# Reference: journald.conf(5)
# ──────────────────────────────────────────────────────────────────────────────
[Journal]

# ── Total persistent journal cap ──────────────────────────────────────────────
# Default: 10% of FS (~1-2 GB on a Crostini container). Confirmed 260 MB
# accumulated after ~3 days with no cap. Capped at 100 MB.
SystemMaxUse=100M

# Back off if free disk drops below 500 MB — journald stops writing rather
# than filling the last available space on a constrained container.
SystemKeepFree=500M

# ── Per-file rotation controls ────────────────────────────────────────────────
# Without these, journald uses: SystemMaxFileSize=1/8 of SystemMaxUse (=12.5 MB)
# and SystemMaxFiles=100, allowing 100 archives × 12.5 MB = 1.25 GB before
# the global cap kicks in. These tighten the rotation cadence.
#
# 5 files × 16 MB = 80 MB max — stays comfortably under SystemMaxUse=100M.
# Faster rotation means the most recent file is always small and queryable.
SystemMaxFileSize=16M
SystemMaxFiles=5

# ── In-memory (volatile, current boot) journal cap ────────────────────────────
RuntimeMaxUse=30M
RuntimeKeepFree=100M

# ── Retention ─────────────────────────────────────────────────────────────────
# 3 days covers any crash timeline. 2 weeks was excessive for a daemon
# whose action events (SIGTERM/SIGKILL lines) repeat when triggered.
# journalctl --rotate + --vacuum-time=3d applied at install time to
# immediately reduce the existing 260 MB journal to this window.
MaxRetentionSec=3d

# ── System-wide rate limiting ─────────────────────────────────────────────────
# mem-watchdog.service uses LogRateLimitBurst=0 (disabled) at the unit level
# because the daemon is architecturally self-rate-limiting — it only logs on
# action events, not on every poll. The system-wide cap here guards against
# other runaway services, not the watchdog.
RateLimitIntervalSec=30s
RateLimitBurst=500
