# .github/workflows/publish.yml
# ──────────────────────────────────────────────────────────────────────────────
# Publish — triggered when a version tag (v*) is pushed.
#
# Typical flow:
#   1. Bump version in vscode-extension/package.json and CHANGELOG.md
#   2. Commit: chore(release): vX.Y.Z
#   3. Tag:    git tag vX.Y.Z && git push origin vX.Y.Z
#
# The VSCE_PAT secret must be set in:
#   GitHub → Settings → Secrets and variables → Actions → VSCE_PAT
#
# The PAT must be an Azure DevOps personal access token with the
# "Marketplace (Manage)" scope for publisher CurtisFranks.
# ──────────────────────────────────────────────────────────────────────────────

name: Publish

on:
  push:
    tags:
      - 'v*'

# Least-privilege: publish job only needs to read source and call vsce with
# the VSCE_PAT secret. No GITHUB_TOKEN write access required.
permissions:
  contents: read

jobs:
  publish:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout only; vsce uses VSCE_PAT secret, not GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: vscode-extension

      - name: Run unit tests
        run: npm test
        working-directory: vscode-extension

      - name: Daemon syntax check
        run: bash -n mem-watchdog.sh

      - name: Build resources
        run: npm run build
        working-directory: vscode-extension

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --no-dependencies
        working-directory: vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
